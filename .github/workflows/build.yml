name: Compilation Bootloader UEFI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code source du dépôt Git
    - name: Récupérer le code
      uses: actions/checkout@v4

    # 2. Installe Clang et LLD
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld

    # 3. Exécute la commande de compilation avec le bon drapeau de point d'entrée
    - name: Compiler le Bootloader
      run: |
        clang -target x86_64-unknown-windows -fuse-ld=lld -ffreestanding -nostdlib -mno-red-zone -shared -Wl,-entry:efi_main -o BOOTX64.EFI main.c

    # 4. Sauvegarde le binaire pour le téléchargement
    - name: Sauvegarder le binaire EFI
      uses: actions/upload-artifact@v4
      with:
        name: uefi-bootloader
        path: BOOTX64.EFI
